name: OpenClaw Pipeline (Daily Lead Scout + Audit)

on:
  schedule:
    # Runs at 4:30 AM ET (9:30 UTC) Mon-Fri, ~90 min before SCO dispatch at 6 AM ET
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run OpenClaw Pipeline (Scout → Audit)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          SITE_BASE: ${{ secrets.SITE_BASE }}
          OUTREACH_FROM: ${{ secrets.OUTREACH_FROM }}
          PHYSICAL_ADDRESS: ${{ secrets.PHYSICAL_ADDRESS }}
          BOOKING_LINK: ${{ secrets.BOOKING_LINK }}
          SKIP_DEMO: '1'
          SKIP_OUTREACH: '1'
        run: node scripts/openclaw-pipeline.js
